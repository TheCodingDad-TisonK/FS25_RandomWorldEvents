name: Bug Report
description: Something is broken or behaving incorrectly in-game.
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        **Before opening this issue:**
        - Check that you are on the latest version of this mod.
        - Check that the bug has not already been reported.
        - Read the log. The game log is at `%USERPROFILE%\Documents\My Games\FarmingSimulator2025\log.txt`. Filter for `[RWE]` lines.

        Issues opened without a log snippet will be closed without response.

  - type: input
    id: mod_version
    attributes:
      label: Mod Version
      description: Found in modDesc.xml or the in-game mod manager.
      placeholder: "e.g. 1.0.0.0"
    validations:
      required: true

  - type: input
    id: game_version
    attributes:
      label: Farming Simulator 25 Version
      description: Found in the main menu bottom-right corner.
      placeholder: "e.g. 1.4.0.0"
    validations:
      required: true

  - type: dropdown
    id: mode
    attributes:
      label: Game Mode
      options:
        - Singleplayer
        - Multiplayer (host)
        - Multiplayer (client)
        - Dedicated Server
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly. What did you see? What did you expect to see?
      placeholder: "A hailstorm event fired but the notification appeared instantly with no warning. The event also lasted 0 seconds — crops were marked damaged but weather never changed visually."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Exact steps that trigger the bug. Note the event type and in-game day if known.
      placeholder: |
        1. Start a new game on Elmcreek with RWE active
        2. Wait until day 12
        3. A hailstorm event fires
        4. Notification pops immediately, crops show damage, but weather does not change
    validations:
      required: true

  - type: textarea
    id: log
    attributes:
      label: Log Snippet
      description: |
        Paste all `[RWE]` lines from your log.txt covering the session where the bug occurred.
        If there are errors (lines containing "Error" or "attempt to"), include the full stack trace.
      render: text
      placeholder: |
        [RWE] Initialized. Events loaded: 12
        [RWE] Event scheduled: HAILSTORM, day=12, severity=HIGH
        [RWE] Event fired: HAILSTORM, duration=0s
        ...
    validations:
      required: true

  - type: textarea
    id: other_mods
    attributes:
      label: Other Mods Loaded
      description: List any other mods active in this save. You can paste the mod list from the game's mod manager.
      placeholder: "FS25_SeasonalCropStress, FS25_SoilFertilizer, Courseplay, ..."
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Anything Else?
      description: Screenshots, save files, or any other context that might help.
    validations:
      required: false
